<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart RFID Dormitory Controller</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Inter & JetBrains Mono for a hyper-clean developer aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .luxury-panel {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
    }
    .pulsing-mic {
      box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4);
      animation: pulse 1.8s infinite cubic-bezier(0.66, 0, 0, 1);
    }
    @keyframes pulse {
      to {
        box-shadow: 0 0 0 30px rgba(244, 63, 94, 0);
      }
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Elegant Custom Range Slider */
    input[type=range]::-webkit-slider-thumb {
      background: #ffffff;
      border: 2px solid #000000;
      height: 20px;
      width: 20px;
      border-radius: 9999px;
      cursor: pointer;
      margin-top: -6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      transition: all 0.15s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    input[type=range]::-webkit-slider-runnable-track {
      background: #1f1f1f;
      height: 8px;
      border-radius: 9999px;
    }
  </style>
</head>
<body class="text-neutral-200 min-h-full flex flex-col relative overflow-x-hidden selection:bg-neutral-800 selection:text-white">
  
  <!-- Subtle top ambient light -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[70vw] h-[15vh] rounded-full bg-rose-500/5 blur-[90px] pointer-events-none z-0"></div>

  <!-- Header -->
  <header class="relative z-10 w-full px-6 pt-8 pb-3 max-w-md mx-auto">
    <div class="flex items-end justify-between border-b border-neutral-900 pb-4">
      <div>
        <h1 class="text-sm font-bold tracking-[0.2em] text-white uppercase font-mono">DORM SYSTEM</h1>
        <p class="text-[10px] text-neutral-500 font-semibold tracking-wider uppercase mt-1">🇹🇼 Dynamic Client • Active Capping</p>
      </div>
      <div id="connection-badge" class="px-2.5 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-neutral-400 border border-neutral-800/80 flex items-center gap-1.5 transition-all">
        <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> SYSTEM OK
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-1 w-full max-w-md mx-auto px-6 pb-24 relative z-10 flex flex-col gap-5">

    <!-- Voice Control Panel -->
    <div class="luxury-panel rounded-2xl p-6 flex flex-col items-center justify-center relative transition-all duration-300">
      <span class="absolute top-4 left-4 text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase">VOICE CONTROLLER</span>
      
      <div class="text-center mt-4 mb-5">
        <p id="mic-status" class="text-[10px] text-neutral-400 font-medium tracking-wide">Tap and speak commands clearly</p>
      </div>
      
      <!-- Microphone Circular Controller -->
      <button id="mic-btn" class="w-20 h-20 rounded-full bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-400 text-2xl shadow-inner transition-all active:scale-95 duration-200 focus:outline-none hover:text-white hover:border-neutral-700">
        <i class="fa-solid fa-microphone" id="mic-icon"></i>
      </button>

      <div class="mt-4 min-h-[32px] flex items-center justify-center">
        <div id="speech-bubble" class="hidden text-xs font-mono text-rose-500 tracking-wide">
          "Listening..."
        </div>
      </div>
    </div>

    <!-- Power & Bedtime Controls -->
    <div class="luxury-panel rounded-2xl p-5 flex flex-col gap-3">
      <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase mb-1">SYSTEM POWER</span>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="sendCommand('ON', 85)" class="py-3 px-2 rounded-xl bg-neutral-900 border border-neutral-800 text-white font-semibold text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
          POWER ON
        </button>
        <button onclick="sendCommand('OFF', 0)" class="py-3 px-2 rounded-xl bg-neutral-900 border border-neutral-850 text-neutral-400 hover:text-rose-500 font-semibold text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-rose-950">
          POWER OFF
        </button>
        <button onclick="sendCommand('BEDTIME', 15)" class="py-3 px-2 rounded-xl bg-neutral-900 border border-neutral-800 text-amber-500/90 font-semibold text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-amber-900/50">
          <i class="fa-solid fa-moon mr-1 text-[10px]"></i> BEDTIME
        </button>
      </div>
    </div>

    <!-- Capped Brightness Intensity Slider -->
    <div class="luxury-panel rounded-2xl p-5">
      <div class="flex items-center justify-between mb-3.5">
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase">INTENSITY (CAPPED AT 85%)</span>
        <span id="brightness-display" class="text-xs font-mono font-bold text-white">80%</span>
      </div>
      <!-- Max slider cap is 85% to protect hardware -->
      <input type="range" id="brightness-slider" min="0" max="85" value="80" 
        class="w-full h-1 bg-neutral-800 rounded-lg appearance-none cursor-pointer outline-none transition-all">
    </div>

    <!-- Modes Grid -->
    <div class="luxury-panel rounded-2xl p-5 flex flex-col gap-4">
      <div>
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase mb-3 block">MODES</span>
        <div class="grid grid-cols-3 gap-2.5">
          <button onclick="sendCommand('RAINBOW')" class="p-3 rounded-xl border border-neutral-800 bg-neutral-900 text-neutral-200 font-medium text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
            🌈 Rainbow
          </button>
          <button onclick="sendCommand('PARTY')" class="p-3 rounded-xl border border-neutral-800 bg-neutral-900 text-neutral-200 font-medium text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
            🕺 Party
          </button>
          <button id="breathe-btn" onclick="triggerBreathing()" class="p-3 rounded-xl border border-neutral-800 bg-neutral-900 text-neutral-200 font-medium text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
            🌬️ Breathe
          </button>
        </div>
      </div>

      <div class="border-t border-neutral-900 pt-4">
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase mb-3 block">SOLID COLORS</span>
        <div class="grid grid-cols-4 gap-2">
          <button onclick="selectColor('blue')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-blue-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">blue</button>
          <button onclick="selectColor('red')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-red-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">red</button>
          <button onclick="selectColor('green')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-green-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">green</button>
          <button onclick="selectColor('cyan')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-cyan-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">cyan</button>
          <button onclick="selectColor('magenta')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-fuchsia-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">magenta</button>
          <button onclick="selectColor('yellow')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-yellow-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">yellow</button>
          <button onclick="selectColor('white')" class="py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-white hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">white</button>
        </div>
      </div>
    </div>

    <!-- Database Logs -->
    <div class="luxury-panel rounded-2xl p-5">
      <div class="flex items-center justify-between border-b border-neutral-900 pb-3 mb-3">
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase">LIVE ACCESS FEED</span>
        <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>
      </div>
      
      <div id="logs-container" class="h-44 overflow-y-auto no-scrollbar flex flex-col gap-2">
        <div class="text-center text-xs text-neutral-600 py-10 font-mono">
          <i class="fa-solid fa-circle-notch animate-spin text-neutral-600 mb-2 block"></i> Synchronizing database logs...
        </div>
      </div>
    </div>

  </main>

  <!-- Elegant Monochromatic Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-xl bg-neutral-900 border border-neutral-800 shadow-2xl flex items-center gap-2.5 translate-y-24 opacity-0 transition-all duration-300 z-50 max-w-[90vw] pointer-events-none font-mono">
    <i id="toast-icon" class="fa-solid text-xs"></i>
    <span id="toast-message" class="text-[10px] uppercase font-bold tracking-wider"></span>
  </div>

  <script>
    // State values
    let currentBrightness = 80;
    let lastSelectedScene = 'ON';
    let lastSelectedColor = 'white'; // Stores active color context for Breathing Mode
    const LIVE_URL = '/api/lights';
    const LOGS_URL = '/api/logs';

    // Elements
    const brightnessSlider = document.getElementById('brightness-slider');
    const brightnessDisplay = document.getElementById('brightness-display');
    const micBtn = document.getElementById('mic-btn');
    const micIcon = document.getElementById('mic-icon');
    const micStatus = document.getElementById('mic-status');
    const speechBubble = document.getElementById('speech-bubble');
    const logsContainer = document.getElementById('logs-container');
    const breatheBtn = document.getElementById('breathe-btn');

    // Update Slider UI & Send Active Event
    brightnessSlider.addEventListener('input', (e) => {
      currentBrightness = parseInt(e.target.value);
      brightnessDisplay.textContent = `${currentBrightness}%`;
    });

    brightnessSlider.addEventListener('change', (e) => {
      currentBrightness = parseInt(e.target.value);
      sendCommand(lastSelectedScene, currentBrightness);
    });

    // Toast Functionality
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');

      toastMessage.textContent = message;

      if (type === 'success') {
        toastIcon.className = 'fa-solid fa-check text-white';
        toast.style.borderColor = '#1a1a1a';
      } else {
        toastIcon.className = 'fa-solid fa-xmark text-rose-500';
        toast.style.borderColor = '#991b1b';
      }

      toast.style.transform = 'translate(-50%, 0)';
      toast.style.opacity = '1';

      setTimeout(() => {
        toast.style.transform = 'translate(-50%, 100px)';
        toast.style.opacity = '0';
      }, 3000);
    }

    // Dynamic Solid Color Selector
    function selectColor(color) {
      lastSelectedColor = color;
      breatheBtn.textContent = `🌬️ Breathe (${color})`;
      sendCommand(color);
    }

    // Breathing trigger combining scene + active color context
    function triggerBreathing() {
      sendCommand('BREATHE');
    }

    // HTTP Payload Sender with Hardware-Protection Capping (85%)
    async function sendCommand(scene, brightness = currentBrightness, triggerSource = "App Button Click", spokenText = null) {
      // Clamp brightness to 85 max to protect ESP32 from overheating
      const clampedBrightness = Math.min(brightness, 85);
      
      // Update global tracking states
      lastSelectedScene = scene;
      const colors = ['blue', 'red', 'green', 'cyan', 'magenta', 'yellow', 'white'];
      if (colors.includes(scene)) {
        lastSelectedColor = scene;
        breatheBtn.textContent = `🌬️ Breathe (${scene})`;
      }

      const payload = {
        scene: scene,
        brightness: clampedBrightness,
        triggerSource: triggerSource,
        spokenText: spokenText
      };

      // Inject the current solid color state into the Breathing payload dynamically
      if (scene === 'BREATHE') {
        payload.color = lastSelectedColor;
      }

      try {
        const response = await fetch(LIVE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          showToast(`SUCCESS: ${scene} (${clampedBrightness}%)`, 'success');
          fetchLogs();
        } else {
          showToast('CONNECTION FAILURE', 'error');
        }
      } catch (err) {
        showToast('NETWORK ERROR', 'error');
      }
    }

    // Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      let isRecording = false;

      micBtn.addEventListener('click', () => {
        if (!isRecording) {
          recognition.start();
        } else {
          recognition.stop();
        }
      });

      recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add('pulsing-mic');
        micBtn.style.borderColor = '#f43f5e';
        micIcon.className = 'fa-solid fa-microphone-lines text-rose-500';
        micStatus.textContent = 'Listening...';
        speechBubble.textContent = '"Listening..."';
        speechBubble.classList.remove('hidden');
      };

      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove('pulsing-mic');
        micBtn.style.borderColor = '#1a1a1a';
        micIcon.className = 'fa-solid fa-microphone text-neutral-450';
        micStatus.textContent = 'Tap to speak commands';
        setTimeout(() => {
          speechBubble.classList.add('hidden');
        }, 4000);
      };

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.trim().toLowerCase();
        speechBubble.textContent = `"${text}"`;
        processSpeech(text);
      };

      recognition.onerror = (event) => {
        showToast(`VOICE ERROR: ${event.error}`, 'error');
      };
    } else {
      micStatus.textContent = 'Voice command not supported by browser';
      micBtn.disabled = true;
      micBtn.style.opacity = '0.3';
    }

    // Client-side voice translation dictionary
    function processSpeech(speech) {
      // 1. Goodnight (Turns everything off)
      if (speech.includes('goodnight') || speech.includes('good night') || speech.includes('sleepy')) {
        sendCommand('OFF', 0, "Voice Command", speech);
        return;
      }
      
      // 2. I'm home (White at max capped brightness 85)
      if (speech.includes("i'm home") || speech.includes("im home") || speech.includes("i am home")) {
        sendCommand('white', 85, "Voice Command", speech);
        return;
      }
      
      // 3. Bedtime mode (Warm low brightness 15)
      if (speech.includes('bedtime') || speech.includes('night mode') || speech.includes('sleeping mode')) {
        sendCommand('BEDTIME', 15, "Voice Command", speech);
        return;
      }

      // 4. Power controls
      if (speech.includes('turn on') || speech === 'on' || speech.includes('power on')) {
        sendCommand('ON', 85, "Voice Command", speech);
        return;
      }
      if (speech.includes('turn off') || speech === 'off' || speech.includes('power off')) {
        sendCommand('OFF', 0, "Voice Command", speech);
        return;
      }
      
      // 5. Modes
      if (speech.includes('party') || speech.includes('club mode') || speech.includes('music lights')) {
        sendCommand('PARTY', 85, "Voice Command", speech);
        return;
      }
      if (speech.includes('rainbow')) {
        sendCommand('RAINBOW', 85, "Voice Command", speech);
        return;
      }
      if (speech.includes('breathe') || speech.includes('breathing')) {
        sendCommand('BREATHE', 60, "Voice Command", speech);
        return;
      }
      
      // 6. Solid Colors
      const colors = ['blue', 'red', 'green', 'cyan', 'magenta', 'yellow', 'white'];
      for (const color of colors) {
        if (speech.includes(color)) {
          sendCommand(color, 85, "Voice Command", speech);
          return;
        }
      }

      showToast(`NO COMMAND MATCH: "${speech}"`, 'error');
    }

    // Access Logs Loader
    async function fetchLogs() {
      try {
        const response = await fetch(LOGS_URL);
        if (response.ok) {
          const logs = await response.json();
          renderLogs(logs);
        }
      } catch (err) {
        console.error('Error fetching logs:', err);
      }
    }

    function renderLogs(logs) {
      if (logs.length === 0) {
        logsContainer.innerHTML = '<div class="text-center text-xs text-neutral-600 py-10 font-mono">No access records in database.</div>';
        return;
      }

      logsContainer.innerHTML = logs.map(log => {
        const time = new Date(log.timestamp).toLocaleTimeString('zh-TW', { hour12: false });
        
        let statusBadgeClass = 'text-neutral-400 bg-neutral-900 border-neutral-800';
        let statusIcon = 'fa-circle-info';
        
        if (log.status === 'UNLOCKED') {
          statusBadgeClass = 'text-emerald-400 bg-emerald-950/20 border-emerald-900/30';
          statusIcon = 'fa-circle-check';
        } else if (log.status === 'ALARM_INTRUDER') {
          statusBadgeClass = 'text-rose-450 bg-rose-950/20 border-rose-900/30';
          statusIcon = 'fa-triangle-exclamation';
        } else if (log.status === 'ON') {
          statusBadgeClass = 'text-neutral-200 bg-neutral-900 border-neutral-800';
          statusIcon = 'fa-power-off';
        } else if (log.status === 'OFF') {
          statusBadgeClass = 'text-neutral-500 bg-neutral-950/40 border-neutral-950';
          statusIcon = 'fa-power-off';
        }
        
        let typeIcon = 'fa-microchip';
        if (log.eventType === 'RFID Swipe') typeIcon = 'fa-id-badge';
        else if (log.eventType === 'App Button Click') typeIcon = 'fa-tablet-screen-button';
        else if (log.eventType === 'Voice Command') typeIcon = 'fa-microphone';

        return `
          <div class="p-3 rounded-xl bg-[#090909] border border-neutral-900/80 flex items-center justify-between text-[11px] font-mono transition-all">
            <div class="flex items-center gap-2.5">
              <span class="w-6 h-6 rounded-lg flex items-center justify-center bg-neutral-900 text-neutral-500 border border-neutral-850">
                <i class="fa-solid ${typeIcon} text-[10px]"></i>
              </span>
              <div>
                <p class="font-bold text-neutral-300 tracking-wide">${log.triggeredBy}</p>
                <p class="text-[9px] text-neutral-600 font-medium">${log.eventType} • ${time}</p>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded border text-[9px] font-bold ${statusBadgeClass} flex items-center gap-1 uppercase tracking-wider">
              <i class="fa-solid ${statusIcon}"></i> ${log.status.length > 18 ? log.status.substring(0, 18) + '...' : log.status}
            </span>
          </div>
        `;
      }).join('');
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }

    // Auto-fetch logs every 3 seconds to keep dashboard alive
    fetchLogs();
    setInterval(fetchLogs, 3000);
  </script>
</body>
</html>
