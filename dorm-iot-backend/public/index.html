<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart RFID Dormitory Controller</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Inter & JetBrains Mono for a hyper-clean developer aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .luxury-panel {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
    }
    .pulsing-mic {
      box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4);
      animation: pulse 1.8s infinite cubic-bezier(0.66, 0, 0, 1);
    }
    @keyframes pulse {
      to {
        box-shadow: 0 0 0 30px rgba(244, 63, 94, 0);
      }
    }
    /* Idle mic glow — draws attention even when not active */
    .mic-idle-glow {
      box-shadow: 0 0 20px 4px rgba(244, 63, 94, 0.12), 0 0 60px 10px rgba(244, 63, 94, 0.06);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Elegant Custom Range Slider */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      background: #1f1f1f;
      border-radius: 9999px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      background: #ffffff;
      border: 2px solid #000000;
      height: 22px;
      width: 22px;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      transition: all 0.15s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    input[type=range]::-moz-range-thumb {
      background: #ffffff;
      border: 2px solid #000000;
      height: 20px;
      width: 20px;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    /* Active mode highlight */
    .mode-active {
      border-color: #f43f5e !important;
      background: rgba(244, 63, 94, 0.06) !important;
      color: #fda4af !important;
    }
    /* Color swatch active ring */
    .color-active {
      outline: 2px solid #f43f5e;
      outline-offset: 2px;
    }
  </style>
</head>
<body class="text-neutral-200 min-h-full flex flex-col relative overflow-x-hidden selection:bg-neutral-800 selection:text-white">
  
  <!-- Subtle top ambient light -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[70vw] h-[15vh] rounded-full bg-rose-500/5 blur-[90px] pointer-events-none z-0"></div>

  <!-- Header -->
  <header class="relative z-10 w-full px-6 pt-8 pb-3 max-w-md mx-auto">
    <div class="flex items-end justify-between border-b border-neutral-900 pb-4">
      <div>
        <h1 class="text-sm font-bold tracking-[0.2em] text-white uppercase font-mono">DORM SYSTEM</h1>
        <p class="text-[10px] text-neutral-500 font-semibold tracking-wider uppercase mt-1">🇹🇼 Dynamic Client • Active Capping</p>
      </div>
      <div class="flex gap-2">
        <button id="mqtt-badge" type="button" onclick="reconnectMqtt(event)" class="px-2 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-neutral-500 border border-neutral-850/80 flex items-center gap-1.5 transition-all font-mono hover:bg-neutral-850 hover:text-white active:scale-95 duration-150 focus:outline-none">
          <span id="mqtt-dot" class="w-1.5 h-1.5 rounded-full bg-neutral-700 transition-all duration-300"></span> MQTT: OFF
        </button>
        <div id="connection-badge" class="px-2.5 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-neutral-400 border border-neutral-800/80 flex items-center gap-1.5 transition-all">
          <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> SYSTEM OK
        </div>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-1 w-full max-w-md mx-auto px-6 pb-24 relative z-10 flex flex-col gap-5">

    <!-- Voice Control Panel — HERO element, made to stand out -->
    <div class="luxury-panel rounded-2xl p-6 flex flex-col items-center justify-center relative transition-all duration-300">
      <span class="absolute top-4 left-4 text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase">VOICE CONTROLLER</span>
      
      <div class="text-center mt-4 mb-5">
        <p id="mic-status" class="text-[10px] text-neutral-400 font-medium tracking-wide">Tap and speak commands clearly</p>
      </div>
      
      <!-- Microphone — Oversized, prominent, glowing rose accent (#5) -->
      <button id="mic-btn" class="w-24 h-24 rounded-full bg-gradient-to-br from-rose-600 to-rose-700 border-2 border-rose-500/40 flex items-center justify-center text-white text-3xl shadow-lg mic-idle-glow transition-all active:scale-95 duration-200 focus:outline-none hover:from-rose-500 hover:to-rose-600">
        <i class="fa-solid fa-microphone" id="mic-icon"></i>
      </button>

      <div class="mt-4 min-h-[32px] flex items-center justify-center">
        <div id="speech-bubble" class="hidden text-xs font-mono text-rose-500 tracking-wide">
          "Listening..."
        </div>
      </div>
    </div>

    <!-- Power & Bedtime Controls (#4 — Power Off matches Power On styling) -->
    <div class="luxury-panel rounded-2xl p-5 flex flex-col gap-3">
      <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase mb-1">SYSTEM POWER</span>
      <div class="grid grid-cols-3 gap-2">
        <button id="btn-power-on" onclick="sendCommand('ON', 85)" class="py-3 px-2 rounded-xl bg-neutral-900 border border-neutral-800 text-white font-semibold text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
          POWER ON
        </button>
        <button id="btn-power-off" onclick="sendCommand('OFF', 0)" class="py-3 px-2 rounded-xl bg-neutral-900 border border-neutral-800 text-white font-semibold text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
          POWER OFF
        </button>
        <button id="btn-bedtime" onclick="activateBedtime()" class="py-3 px-2 rounded-xl bg-neutral-900 border border-neutral-800 text-amber-500/90 font-semibold text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-amber-900/50">
          <i class="fa-solid fa-moon mr-1 text-[10px]"></i> BEDTIME
        </button>
      </div>
    </div>

    <!-- Capped Brightness Intensity Slider (#8 — now sends on input for real-time control) -->
    <div class="luxury-panel rounded-2xl p-5">
      <div class="flex items-center justify-between mb-3.5">
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase">INTENSITY (CAPPED AT 85%)</span>
        <span id="brightness-display" class="text-xs font-mono font-bold text-white">80%</span>
      </div>
      <!-- Max slider cap is 85% to protect hardware -->
      <input type="range" id="brightness-slider" min="0" max="85" value="80">
    </div>

    <!-- Modes Grid (#10 — renamed to "COLORS") -->
    <div class="luxury-panel rounded-2xl p-5 flex flex-col gap-4">
      <div>
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase mb-3 block">MODES</span>
        <div class="grid grid-cols-3 gap-2.5">
          <button id="mode-rainbow" onclick="activateMode('RAINBOW')" class="p-3 rounded-xl border border-neutral-800 bg-neutral-900 text-neutral-200 font-medium text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
            🌈 Rainbow
          </button>
          <button id="mode-party" onclick="activateMode('PARTY')" class="p-3 rounded-xl border border-neutral-800 bg-neutral-900 text-neutral-200 font-medium text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
            🕺 Party
          </button>
          <button id="mode-aurora" onclick="activateMode('AURORA')" class="p-3 rounded-xl border border-neutral-800 bg-neutral-900 text-neutral-200 font-medium text-xs tracking-wide transition-all active:scale-95 duration-200 hover:border-neutral-700">
            🌌 Aurora
          </button>
        </div>
      </div>

      <!-- Colors (#10 — renamed from "SOLID COLORS", #12 — 8th color added: orange) -->
      <div class="border-t border-neutral-900 pt-4">
        <span class="text-[9px] font-bold tracking-widest text-neutral-500 font-mono uppercase mb-3 block">COLORS</span>
        <div class="grid grid-cols-4 gap-2" id="color-grid">
          <button data-color="blue" onclick="selectColor('blue')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-blue-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">blue</button>
          <button data-color="red" onclick="selectColor('red')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-red-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">red</button>
          <button data-color="green" onclick="selectColor('green')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-green-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">green</button>
          <button data-color="cyan" onclick="selectColor('cyan')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-cyan-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">cyan</button>
          <button data-color="magenta" onclick="selectColor('magenta')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-fuchsia-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">magenta</button>
          <button data-color="yellow" onclick="selectColor('yellow')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-yellow-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">yellow</button>
          <button data-color="orange" onclick="selectColor('orange')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-orange-400 hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">orange</button>
          <button data-color="white" onclick="selectColor('white')" class="color-btn py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-white hover:bg-neutral-900 font-semibold text-xs transition-all duration-200">white</button>
        </div>
      </div>
    </div>

    <!-- Live Access Feed — Now just a navigation button (#11) -->
    <a href="/feed.html" class="luxury-panel rounded-2xl p-5 flex items-center justify-between group transition-all hover:border-neutral-700 cursor-pointer no-underline">
      <div class="flex items-center gap-3">
        <span class="w-8 h-8 rounded-lg flex items-center justify-center bg-neutral-900 border border-neutral-800 text-neutral-400 group-hover:text-white transition-all">
          <i class="fa-solid fa-clock-rotate-left text-xs"></i>
        </span>
        <div>
          <span class="text-xs font-bold text-neutral-200 tracking-wide block">Live Access Feed</span>
          <span class="text-[9px] text-neutral-500 font-mono tracking-wider">Database logs & RFID events</span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>
        <i class="fa-solid fa-chevron-right text-neutral-600 text-xs group-hover:text-neutral-400 transition-all"></i>
      </div>
    </a>

    <!-- Virtual Door — Software replacement for servo motor -->
    <a href="/door.html" class="luxury-panel rounded-2xl p-5 flex items-center justify-between group transition-all hover:border-neutral-700 cursor-pointer no-underline">
      <div class="flex items-center gap-3">
        <span class="w-8 h-8 rounded-lg flex items-center justify-center bg-neutral-900 border border-neutral-800 text-neutral-400 group-hover:text-white transition-all">
          <i class="fa-solid fa-door-open text-xs"></i>
        </span>
        <div>
          <span class="text-xs font-bold text-neutral-200 tracking-wide block">Virtual Door</span>
          <span class="text-[9px] text-neutral-500 font-mono tracking-wider">RFID lock simulator & live status</span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        <i class="fa-solid fa-chevron-right text-neutral-600 text-xs group-hover:text-neutral-400 transition-all"></i>
      </div>
    </a>

  </main>

  <!-- Elegant Monochromatic Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-xl bg-neutral-900 border border-neutral-800 shadow-2xl flex items-center gap-2.5 translate-y-24 opacity-0 transition-all duration-300 z-50 max-w-[90vw] pointer-events-none font-mono">
    <i id="toast-icon" class="fa-solid text-xs"></i>
    <span id="toast-message" class="text-[10px] uppercase font-bold tracking-wider"></span>
  </div>

  <script>
    // State values
    let currentBrightness = 80;
    let lastSelectedScene = 'ON';
    let activeMode = null; // Tracks which mode button is currently active
    const LIVE_URL = '/api/lights';

    // Elements
    const brightnessSlider = document.getElementById('brightness-slider');
    const brightnessDisplay = document.getElementById('brightness-display');
    const micBtn = document.getElementById('mic-btn');
    const micIcon = document.getElementById('mic-icon');
    const micStatus = document.getElementById('mic-status');
    const speechBubble = document.getElementById('speech-bubble');

    // Debounce timer for slider
    let sliderDebounce = null;

    // Update Slider UI display on drag, and send command with debounce (#8)
    brightnessSlider.addEventListener('input', (e) => {
      currentBrightness = parseInt(e.target.value);
      brightnessDisplay.textContent = `${currentBrightness}%`;
      
      // Debounce: send the brightness update 150ms after the user stops dragging
      clearTimeout(sliderDebounce);
      sliderDebounce = setTimeout(() => {
        sendCommand(lastSelectedScene, currentBrightness);
      }, 150);
    });

    // Also send on final release for reliability
    brightnessSlider.addEventListener('change', (e) => {
      currentBrightness = parseInt(e.target.value);
      brightnessDisplay.textContent = `${currentBrightness}%`;
      clearTimeout(sliderDebounce);
      sendCommand(lastSelectedScene, currentBrightness);
    });

    // Toast Functionality
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');

      toastMessage.textContent = message;

      if (type === 'success') {
        toastIcon.className = 'fa-solid fa-check text-white';
        toast.style.borderColor = '#1a1a1a';
      } else {
        toastIcon.className = 'fa-solid fa-xmark text-rose-500';
        toast.style.borderColor = '#991b1b';
      }

      toast.style.transform = 'translate(-50%, 0)';
      toast.style.opacity = '1';

      setTimeout(() => {
        toast.style.transform = 'translate(-50%, 100px)';
        toast.style.opacity = '0';
      }, 3000);
    }

    // Highlight the active mode button and clear others
    function setActiveModeUI(modeId) {
      // Clear all mode highlights
      ['mode-rainbow', 'mode-party', 'mode-aurora'].forEach(id => {
        document.getElementById(id).classList.remove('mode-active');
      });
      // Set the new active one
      if (modeId) {
        document.getElementById(modeId).classList.add('mode-active');
        activeMode = modeId;
      } else {
        activeMode = null;
      }
    }

    // Highlight the active color button and clear others
    function setActiveColorUI(color) {
      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.remove('color-active');
      });
      if (color) {
        const btn = document.querySelector(`.color-btn[data-color="${color}"]`);
        if (btn) btn.classList.add('color-active');
      }
    }

    // Mode Activations
    function activateMode(mode) {
      if (mode === 'RAINBOW') {
        setActiveModeUI('mode-rainbow');
        setActiveColorUI(null);
        sendCommand('RAINBOW');
      } else if (mode === 'PARTY') {
        setActiveModeUI('mode-party');
        setActiveColorUI(null);
        sendCommand('PARTY', 85);
      } else if (mode === 'AURORA') {
        setActiveModeUI('mode-aurora');
        setActiveColorUI(null);
        sendCommand('AURORA');
      }
    }

    // Bedtime activation (#2, #7 — warm color, low brightness)
    function activateBedtime() {
      setActiveModeUI(null);
      setActiveColorUI(null);
      // Set slider to 15 to reflect bedtime brightness
      currentBrightness = 15;
      brightnessSlider.value = 15;
      brightnessDisplay.textContent = '15%';
      sendCommand('BEDTIME', 15);
    }

    // Dynamic Color Selector
    function selectColor(color) {
      setActiveColorUI(color);
      setActiveModeUI(null);
      sendCommand(color);
    }

    // HTTP Payload Sender with Hardware-Protection Capping (85%)
    async function sendCommand(scene, brightness = currentBrightness, triggerSource = "App Button Click", spokenText = null) {
      // If turning off, clear all active color and mode UI highlights
      if (scene === 'OFF') {
        setActiveModeUI(null);
        setActiveColorUI(null);
      }

      // Clamp brightness to 85 max to protect ESP32 from overheating
      const clampedBrightness = Math.min(brightness, 85);
      
      // Update global tracking state
      lastSelectedScene = scene;

      const payload = {
        scene: scene,
        brightness: clampedBrightness,
        triggerSource: triggerSource,
        spokenText: spokenText
      };

      // Inject extra metadata for specific modes so ESP32 firmware can differentiate
      if (scene === 'PARTY') {
        payload.effect = 'strobe';
        payload.speed = 'fast';
      }
      if (scene === 'BEDTIME') {
        payload.color = 'warm';
      }

      try {
        const response = await fetch(LIVE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          showToast(`SUCCESS: ${scene} (${clampedBrightness}%)`, 'success');
        } else {
          showToast('CONNECTION FAILURE', 'error');
        }
      } catch (err) {
        showToast('NETWORK ERROR', 'error');
      }
    }

    // Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      let isRecording = false;

      micBtn.addEventListener('click', () => {
        if (!isRecording) {
          recognition.start();
        } else {
          recognition.stop();
        }
      });

      recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add('pulsing-mic');
        micBtn.classList.remove('mic-idle-glow');
        micBtn.style.borderColor = '#fff';
        micIcon.className = 'fa-solid fa-microphone-lines text-white text-3xl';
        micStatus.textContent = 'Listening...';
        speechBubble.textContent = '"Listening..."';
        speechBubble.classList.remove('hidden');
      };

      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove('pulsing-mic');
        micBtn.classList.add('mic-idle-glow');
        micBtn.style.borderColor = '';
        micIcon.className = 'fa-solid fa-microphone text-white text-3xl';
        micStatus.textContent = 'Tap to speak commands';
        setTimeout(() => {
          speechBubble.classList.add('hidden');
        }, 4000);
      };

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.trim().toLowerCase();
        speechBubble.textContent = `"${text}"`;
        processSpeech(text);
      };

      recognition.onerror = (event) => {
        showToast(`VOICE ERROR: ${event.error}`, 'error');
      };
    } else {
      micStatus.textContent = 'Voice command not supported by browser';
      micBtn.disabled = true;
      micBtn.style.opacity = '0.3';
    }

    // ─── Voice Command Engine (regex word-boundary matching) ─────────────────
    // Uses \b word boundaries so "lights off" matches "off", but "offline" won't.
    // Priority order matters — checked top to bottom, first match wins.
    function processSpeech(speech) {

      // ── Tier 1: Specific phrases (checked first to avoid partial word conflicts) ──

      // "goodnight" / "good night" / "sleepy" → full off
      if (/good\s?night|sleepy/.test(speech)) {
        sendCommand('OFF', 0, "Voice Command", speech);
        return;
      }

      // "i'm home" / "im home" / "i am home" → white at full brightness
      if (/i'?m home|i am home/.test(speech)) {
        sendCommand('white', 85, "Voice Command", speech);
        return;
      }

      // Bedtime phrases
      if (/\bbedtime\b|night mode|sleeping mode/.test(speech)) {
        activateBedtime();
        return;
      }

      // ── Tier 2: Modes ─────────────────────────────────────────────────────

      if (/\bparty\b|club mode|disco|music lights/.test(speech)) {
        activateMode('PARTY');
        return;
      }

      if (/\brainbow\b/.test(speech)) {
        activateMode('RAINBOW');
        return;
      }

      if (/\baurora\b|northern lights/.test(speech)) {
        activateMode('AURORA');
        return;
      }

      // ── Tier 3: Power on/off (word boundary so "orange" doesn't trigger "on") ──

      // OFF — matches: "off", "lights off", "turn off", "turn off the lights", "switch off"
      if (/\boff\b/.test(speech)) {
        sendCommand('OFF', 0, "Voice Command", speech);
        return;
      }

      // ON — matches: "on", "lights on", "turn on", "turn on the lights", "switch on"
      // \bon\b safely excludes words like "orange", "only", "console"
      if (/\bon\b/.test(speech)) {
        sendCommand('ON', 85, "Voice Command", speech);
        return;
      }

      // ── Tier 4: Solid Colors ──────────────────────────────────────────────

      const colorPatterns = [
        { pattern: /\bblue\b/,    color: 'blue'    },
        { pattern: /\bred\b/,     color: 'red'     },
        { pattern: /\bgreen\b/,   color: 'green'   },
        { pattern: /\bcyan\b/,    color: 'cyan'    },
        { pattern: /\bmagenta\b/, color: 'magenta' },
        { pattern: /\byellow\b/,  color: 'yellow'  },
        { pattern: /\borange\b/,  color: 'orange'  },
        { pattern: /\bwhite\b/,   color: 'white'   },
      ];

      for (const { pattern, color } of colorPatterns) {
        if (pattern.test(speech)) {
          selectColor(color);
          return;
        }
      }

      showToast(`NO MATCH: "${speech}"`, 'error');
    }

    // Poll MQTT Status
    async function updateMqttStatus() {
      const mqttDot = document.getElementById('mqtt-dot');
      const mqttBadge = document.getElementById('mqtt-badge');
      try {
        const res = await fetch('/api/mqtt-status');
        const data = await res.json();
        if (data.connected) {
          mqttBadge.className = 'px-2 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-emerald-400 border border-emerald-950/80 flex items-center gap-1.5 transition-all font-mono';
          mqttBadge.innerHTML = '<span id="mqtt-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> MQTT: LIVE';
        } else {
          mqttBadge.className = 'px-2 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-rose-400 border border-rose-950/80 flex items-center gap-1.5 transition-all font-mono';
          mqttBadge.innerHTML = '<span id="mqtt-dot" class="w-1.5 h-1.5 rounded-full bg-rose-500"></span> MQTT: OFF';
        }
      } catch (err) {
        mqttBadge.className = 'px-2 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-neutral-500 border border-neutral-800/80 flex items-center gap-1.5 transition-all font-mono';
        mqttBadge.innerHTML = '<span id="mqtt-dot" class="w-1.5 h-1.5 rounded-full bg-neutral-700"></span> MQTT: ERROR';
      }
    }
    updateMqttStatus();
    setInterval(updateMqttStatus, 3000);

    let isReconnecting = false;
    async function reconnectMqtt(event) {
      if (event) event.preventDefault();
      if (isReconnecting) return;
      isReconnecting = true;
      
      const mqttBadge = document.getElementById('mqtt-badge');
      mqttBadge.className = 'px-2 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-amber-400 border border-amber-950/80 flex items-center gap-1.5 transition-all font-mono';
      mqttBadge.innerHTML = '<span id="mqtt-dot" class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-spin"></span> CONNECTING...';
      showToast('CONNECTING TO MQTT BROKER...', 'success');
      
      try {
        const res = await fetch('/api/mqtt-reconnect', { method: 'POST' });
        
        let data = {};
        const contentType = res.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
          data = await res.json();
        } else {
          throw new Error(`Server returned non-JSON response (Status ${res.status}). Did you restart the server?`);
        }
        
        if (res.ok && data.connected) {
          showToast('MQTT CONNECTED!', 'success');
        } else {
          showToast(`CONNECTION FAILED: ${data.message || 'Error'}`, 'error');
        }
      } catch (err) {
        console.error('MQTT reconnect error details:', err);
        showToast('NETWORK ERROR TRYING TO RECONNECT', 'error');
      } finally {
        isReconnecting = false;
        updateMqttStatus();
      }
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
