<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Access Feed — Dorm System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .luxury-panel {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="text-neutral-200 min-h-full flex flex-col relative overflow-x-hidden selection:bg-neutral-800 selection:text-white">
  
  <!-- Subtle top ambient light -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[70vw] h-[15vh] rounded-full bg-rose-500/5 blur-[90px] pointer-events-none z-0"></div>

  <!-- Header -->
  <header class="relative z-10 w-full px-6 pt-8 pb-3 max-w-md mx-auto">
    <div class="flex items-end justify-between border-b border-neutral-900 pb-4">
      <div class="flex items-center gap-3">
        <a href="/" class="w-8 h-8 rounded-lg bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-white hover:border-neutral-700 transition-all active:scale-95">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </a>
        <div>
          <h1 class="text-sm font-bold tracking-[0.2em] text-white uppercase font-mono">ACCESS FEED</h1>
          <p class="text-[10px] text-neutral-500 font-semibold tracking-wider uppercase mt-1">Live Database Stream</p>
        </div>
      </div>
      <div class="px-2.5 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-neutral-400 border border-neutral-800/80 flex items-center gap-1.5 transition-all">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> SYNCED
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-1 w-full max-w-md mx-auto px-6 pb-12 relative z-10 flex flex-col gap-5">
    
    <!-- Filter Stats -->
    <div class="flex items-center gap-2">
      <span id="total-count" class="px-2.5 py-1 text-[9px] font-bold tracking-wider rounded-md bg-neutral-900 text-neutral-400 border border-neutral-800/80 font-mono">0 RECORDS</span>
      <span class="text-[9px] text-neutral-600 font-mono">Auto-refresh every 3s</span>
    </div>

    <!-- Logs List -->
    <div class="luxury-panel rounded-2xl p-5">
      <div id="logs-container" class="flex flex-col gap-2 min-h-[60vh]">
        <div class="text-center text-xs text-neutral-600 py-10 font-mono">
          <i class="fa-solid fa-circle-notch animate-spin text-neutral-600 mb-2 block"></i> Synchronizing database logs...
        </div>
      </div>
    </div>

  </main>

  <script>
    const LOGS_URL = '/api/logs';
    const logsContainer = document.getElementById('logs-container');
    const totalCount = document.getElementById('total-count');

    async function fetchLogs() {
      try {
        const response = await fetch(LOGS_URL);
        if (response.ok) {
          const logs = await response.json();
          totalCount.textContent = `${logs.length} RECORDS`;
          renderLogs(logs);
        }
      } catch (err) {
        console.error('Error fetching logs:', err);
      }
    }

    function renderLogs(logs) {
      if (logs.length === 0) {
        logsContainer.innerHTML = '<div class="text-center text-xs text-neutral-600 py-10 font-mono">No access records in database.</div>';
        return;
      }

      logsContainer.innerHTML = logs.map(log => {
        const time = new Date(log.timestamp).toLocaleTimeString('zh-TW', { hour12: false });
        const date = new Date(log.timestamp).toLocaleDateString('zh-TW');
        
        let statusBadgeClass = 'text-neutral-400 bg-neutral-900 border-neutral-800';
        let statusIcon = 'fa-circle-info';
        
        if (log.status === 'UNLOCKED') {
          statusBadgeClass = 'text-emerald-400 bg-emerald-950/20 border-emerald-900/30';
          statusIcon = 'fa-circle-check';
        } else if (log.status === 'ALARM_INTRUDER') {
          statusBadgeClass = 'text-rose-450 bg-rose-950/20 border-rose-900/30';
          statusIcon = 'fa-triangle-exclamation';
        } else if (log.status === 'ON') {
          statusBadgeClass = 'text-neutral-200 bg-neutral-900 border-neutral-800';
          statusIcon = 'fa-power-off';
        } else if (log.status === 'OFF') {
          statusBadgeClass = 'text-neutral-500 bg-neutral-950/40 border-neutral-950';
          statusIcon = 'fa-power-off';
        }
        
        let typeIcon = 'fa-microchip';
        if (log.eventType === 'RFID Swipe') typeIcon = 'fa-id-badge';
        else if (log.eventType === 'App Button Click') typeIcon = 'fa-tablet-screen-button';
        else if (log.eventType === 'Voice Command') typeIcon = 'fa-microphone';

        return `
          <div class="p-3 rounded-xl bg-[#090909] border border-neutral-900/80 flex items-center justify-between text-[11px] font-mono transition-all">
            <div class="flex items-center gap-2.5">
              <span class="w-6 h-6 rounded-lg flex items-center justify-center bg-neutral-900 text-neutral-500 border border-neutral-850">
                <i class="fa-solid ${typeIcon} text-[10px]"></i>
              </span>
              <div>
                <p class="font-bold text-neutral-300 tracking-wide">${log.triggeredBy}</p>
                <p class="text-[9px] text-neutral-600 font-medium">${log.eventType} • ${date} ${time}</p>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded border text-[9px] font-bold ${statusBadgeClass} flex items-center gap-1 uppercase tracking-wider">
              <i class="fa-solid ${statusIcon}"></i> ${log.status.length > 18 ? log.status.substring(0, 18) + '...' : log.status}
            </span>
          </div>
        `;
      }).join('');
    }

    fetchLogs();
    setInterval(fetchLogs, 3000);
  </script>
</body>
</html>
